<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>물과 대추야자 - Yun Eunkeong</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 상세 페이지 전용 탭 스타일 */
        .work-tabs {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .tab-btn {
            cursor: pointer;
            color: #ccc;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: #000;
            font-weight: bold;
            text-decoration: underline;
        }
        .tab-btn:hover { color: #000; }
        
        /* 언어별 컨텐츠 숨기기 설정 */
        .lang-content { display: none; line-height: 1.8; }
        .lang-content.active { display: block; }

        .back-link { color: #000; text-decoration: none; }

        /* [추가] 유튜브 비디오 반응형 16:9 비율 유지 스타일 */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 비율 설정 */
            height: 0;
            overflow: hidden;
            margin-bottom: 20px; /* 기존 이미지 밑 여백과 동일하게 설정 */
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="btm-menu">
            <a href="about.html"><div class="menu">Yun Eunkeong</div></a>
            <a href="works.html"><div class="menu clicked">Works</div></a>
            <a href="cv.html"><div class="menu">CV</div></a>
            <a href="archive.html"><div class="menu">♧</div></a> 
        </div>

        <div class="index-container">
            <article class="post">
                
                <!-- [수정] 기존 이미지를 지우고 유튜브 임베드 코드로 교체했습니다 -->
                <div class="video-wrapper">
                    <iframe src="https://youtu.be/9Lx6VEXpR_A?si=cDZufBbS5vhYYcKC" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                
                <h4>물과 대추야자</h4>
                <p style="opacity: 0.6;">2024</p>

                <div class="work-tabs">
                    <span class="tab-btn active" onclick="changeLang('ko')">KR</span>
                    <span class="tab-btn" onclick="changeLang('en')">EN</span>
                    <a href="works.html" class="back-link">List</a>
                </div>

                <div id="ko-content" class="lang-content active">
                    <p>물과 대추야자 <br>
                    </p>
                </div>

                <div id="en-content" class="lang-content">
                    <p> <br>
                    </p>
                </div>
            </article>
        </div>
    </div>

    <script>
        function changeLang(lang) {
            // 모든 컨텐츠 숨기기
            document.querySelectorAll('.lang-content').forEach(el => el.classList.remove('active'));
            // 모든 버튼 비활성화
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            // 선택한 언어만 보이기
            if(lang === 'ko') {
                document.getElementById('ko-content').classList.add('active');
                event.target.classList.add('active');
            } else {
                document.getElementById('en-content').classList.add('active');
                event.target.classList.add('active');
            }
        }
    </script>
</body>
</html>
