<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>루프 Loop - Yun Eunkeong</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 상세 페이지 전용 탭 스타일 */
        .work-tabs {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .tab-btn {
            cursor: pointer;
            color: #ccc;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: #000;
            font-weight: bold;
            text-decoration: underline;
        }
        .tab-btn:hover { color: #000; }
        
        /* 언어별 컨텐츠 숨기기 설정 */
        .lang-content { display: none; line-height: 1.8; }
        .lang-content.active { display: block; }

        .back-link { color: #000; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="btm-menu">
            <a href="about.html"><div class="menu">Yun Eunkeong</div></a>
            <a href="works.html"><div class="menu clicked">Works</div></a>
            <a href="cv.html"><div class="menu">CV</div></a>
            <a href="archive.html"><div class="menu">♧</div></a> 
        </div>

        <div class="index-container">
            <article class="post">
                <img src="work01.jpg" alt="Loop" style="width: 100%; margin-bottom: 20px;">
                
                <h4>루프 Loop</h4>
                <p style="opacity: 0.6;">2025</p>

                <div class="work-tabs">
                    <span class="tab-btn active" onclick="changeLang('ko')">KR</span>
                    <span class="tab-btn" onclick="changeLang('en')">EN</span>
                    <a href="works.html" class="back-link">List</a>
                </div>

                <div id="ko-content" class="lang-content active">
                    <p>여기에 '루프' 작품에 대한 한국어 설명을 적으세요. <br>
                    예: 반복되는 이미지의 궤적을 통해 미디어의 영속성을 탐구하는 작업입니다.</p>
                </div>

                <div id="en-content" class="lang-content">
                    <p>Write English description for 'Loop' here. <br>
                    Ex: This work explores the permanence of media through the trajectory of repeating images.</p>
                </div>
            </article>
        </div>
    </div>

    <script>
        function changeLang(lang) {
            // 모든 컨텐츠 숨기기
            document.querySelectorAll('.lang-content').forEach(el => el.classList.remove('active'));
            // 모든 버튼 비활성화
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            // 선택한 언어만 보이기
            if(lang === 'ko') {
                document.getElementById('ko-content').classList.add('active');
                event.target.classList.add('active');
            } else {
                document.getElementById('en-content').classList.add('active');
                event.target.classList.add('active');
            }
        }
    </script>
</body>
</html>
